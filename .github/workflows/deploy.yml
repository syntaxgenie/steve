name: Deploy to VM

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STEVE_VM_SSH_KEY }}

      - name: Trust VM host key
        run: ssh-keyscan -H 20.244.68.106 >> ~/.ssh/known_hosts

      # jOOQ codegen and Flyway migrate both run during `mvn package` (bound to
      # generate-sources) and need a real, reachable MySQL - that only exists on
      # the VM itself. So the source is synced there and built in place, exactly
      # like the original manual process, rather than built on this runner.
      # application-prod.properties is deliberately excluded - the VM's own
      # real, already-configured copy is reused instead of the placeholder one
      # from git, and it's never uploaded anywhere.
      - name: Sync source to a build staging directory on the VM
        run: |
          rsync -az --delete \
            --exclude 'application-prod.properties' \
            --exclude 'target' \
            --exclude '.git' \
            ./ azureuser@20.244.68.106:/home/azureuser/steve-deploy-staging/

      - name: Build on the VM, swap in the new WAR, restart with rollback on failure
        run: |
          ssh azureuser@20.244.68.106 '
            set -e
            cd /home/azureuser/steve-deploy-staging

            cp /home/azureuser/steve-steve-3.13.0/src/main/resources/application-prod.properties \
               src/main/resources/application-prod.properties

            JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64 ./mvnw -B package -Pprod,mysql -DskipTests

            cp target/steve.war /home/azureuser/steve-steve-3.13.0/target/steve.war.new

            cd /home/azureuser/steve-steve-3.13.0/target
            mv steve.war steve.war.bak
            mv steve.war.new steve.war
            sudo systemctl restart steve
            sleep 5
            if sudo systemctl is-active --quiet steve; then
              echo "steve restarted successfully"
              rm -f steve.war.bak
            else
              echo "steve failed to start on the new build - rolling back"
              mv steve.war.bak steve.war
              sudo systemctl restart steve
              exit 1
            fi
          '
